services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: jjlpg
      POSTGRES_USER: jjlpg
      POSTGRES_PASSWORD: jjlpg
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jjlpg -d jjlpg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

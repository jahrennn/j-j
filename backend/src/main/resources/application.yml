server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: jjlpg-trading
  datasource:
    url: jdbc:postgresql://localhost:5432/jjlpg
    username: jjlpg
    password: jjlpg
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:jjlpg-dev-secret-change-in-production-min-32-chars}
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000

server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: jjlpg-trading
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/jjlpg}
    username: ${DB_USER:jjlpg}
    password: ${DB_PASSWORD:jjlpg}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:jjlpg-dev-secret-change-in-production-min-32-chars-make-it-long-enough-for-hs256}
    expiration-ms: 3600000 # 1 hour instead of 24 hours
  cors:
    allowed-origins: http://localhost:3000
